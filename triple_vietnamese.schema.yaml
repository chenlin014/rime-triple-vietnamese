# Rime schema
# encoding: utf-8

schema:
  schema_id: triple_vietnamese
  name: Ba Việt
  version: '0.0'
  author:
    - 陳林(Chén Lín / Trần Lâm) <1chen0bryan@gmail.com>

switches:
  - name: ascii_mode
    reset: 0
    states: [ Việt, ABC ]
  - name: hannom
    states: [ chữ, 𡨸 ]

engine:
  processors:
    - lua_processor@*triple_viet*proc
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - lua_translator@*triple_viet*tran@main
    - lua_translator@*triple_viet*tran@hannom

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA~`!@#$%^&*()-_+=[]{}\\|:;\"',.<>/?"
  initials: "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA"

translator:
  dictionary: cake_gao_chunom

hannom:
  dictionary: cake_gao_chunom

punctuator:

key_binder:
  import_preset: default
  bindings:
    # disabling paging with period and comma
    - { when: has_menu, accept: period, send: period}
    - { when: has_menu, accept: comma, send: comma}
    - { when: has_menu, accept: Escape, toggle: hannom}

editor:
  bindings:
    Return: confirm

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
